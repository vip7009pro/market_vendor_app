<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />
  <!-- Shopping Cart Icon -->
  <g fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" transform="translate(100, 100)">
    <!-- Cart basket -->
    <path d="M40 40 H80 L120 200 H260 L290 80 H100" />
    <!-- Wheels -->
    <circle cx="130" cy="250" r="22" fill="#ffffff" stroke="none" />
    <circle cx="250" cy="250" r="22" fill="#ffffff" stroke="none" />
    <!-- Style stripes inside basket -->
    <path d="M140 100 H230" stroke-width="18" stroke-opacity="0.3" />
    <path d="M150 140 H210" stroke-width="18" stroke-opacity="0.3" />
  </g>
</svg>
